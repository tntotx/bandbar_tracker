<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Band Bar Tracker</title>
    <meta name="theme-color" content="#1e1e1e">
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #f0f0f0; }
        .tab-container { display: flex; overflow-x: auto; background: #2a2a2a; padding: 10px; }
        .tab { padding: 10px 20px; background: transparent; border: none; color: #a0a0a0; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab.active { color: #2196f3; border-bottom: 2px solid #2196f3; }
        .content { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; margin: 5px; }
        button:hover { background: #0066b3; }
        .entry-group { margin-bottom: 15px; padding: 10px; background: #2a2a2a; border-radius: 4px; }
        input { background: #3a3a3a; color: #ffffff; border: 1px solid #4a4a4a; padding: 8px; border-radius: 4px; width: 100%; font-size: 14px; margin: 5px 0; }
        .exercise-box { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .set-row { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .set-row input { flex: 1; }
        .pr-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-right: 5px; }
        .pr-full { background: #b7ffb0; color: #1e1e1e; }
        .pr-partial { background: #b0d8ff; color: #1e1e1e; }
        .pr-both { background: #ffe08a; color: #1e1e1e; }
        .history-item { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #2a2a2a; padding: 20px; border-radius: 8px; max-width: 90%; max-height: 90%; overflow-y: auto; }
        .list-item { padding: 10px; background: #3a3a3a; margin: 5px 0; border-radius: 4px; cursor: pointer; }
        .scroll-area { max-height: 400px; overflow-y: auto; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="tab-container">
        <button class="tab active" onclick="switchTab('templates')">📝 Templates</button>
        <button class="tab" onclick="switchTab('log')">🏋 Log</button>
        <button class="tab" onclick="switchTab('history')">📜 History</button>
        <button class="tab" onclick="switchTab('progress')">📈 Progress</button>
    </div>
    <div id="templates" class="tab-content content active">
        <button onclick="openTemplateModal()">➕ Add Template</button>
        <button onclick="openTemplateList()">📋 View</button>
        <div class="scroll-area" id="template-list"></div>
    </div>
    <div id="log" class="tab-content content">
        <button onclick="openTemplateList()">📄 Load Template</button>
        <button onclick="saveWorkout()">💾 Save</button>
        <div class="scroll-area" id="log-area"></div>
    </div>
    <div id="history" class="tab-content content">
        <button onclick="loadHistory()">🔄 Refresh</button>
        <button onclick="exportCSV()">📊 Export</button>
        <div class="scroll-area" id="history-list"></div>
    </div>
    <div id="progress" class="tab-content content">
        <button onclick="loadProgress()">🔄 Refresh</button>
        <div class="scroll-area" id="progress-list"></div>
    </div>
    <div id="template-modal" class="modal">
        <div class="modal-content">
            <h3>Template</h3>
            <input type="text" id="template-name" placeholder="Template Name">
            <div id="template-exercises"></div>
            <button onclick="addTemplateExercise()">➕ Exercise</button>
            <button onclick="saveTemplate()">💾 Save</button>
            <button onclick="closeTemplateModal()">❌ Cancel</button>
        </div>
    </div>
    <script>
        let currentExercises = [], editingWorkoutId = null, editingTemplateId = null;
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        async function openTemplateList() {
            const res = await fetch('/api/templates');
            const templates = await res.json();
            document.getElementById('template-list').innerHTML = templates.map(t => `<div class="list-item" onclick="openTemplateModal('${t.id}', ${JSON.stringify(t)})"><strong>${t.name}</strong> - ${t.exercises?.length || 0}
ex</div>`).join('');
        }
        async function loadHistory() {
            const res = await fetch('/api/workouts');
            const workouts = await res.json();
            document.getElementById('history-list').innerHTML = workouts.map(w => `<div class="history-item" onclick="editWorkout('${w.id}', ${JSON.stringify(w)})"><strong>${w.date}</strong><br>${w.exercises?.length || 0}
exercises</div>`).join('');
        }
        async function loadProgress() {
            const res = await fetch('/api/progress');
            const progress = await res.json();
            document.getElementById('progress-list').innerHTML = progress.map(p => `<div class="exercise-box">${p.tags.map(t => `<span class="pr-badge pr-${t}">${t === 'pr_both' ? 'Both' : t === 'pr_full' ? 'Full' :
'Part'}</span>`).join('')}<strong>${p.exercise}</strong><br>Date: ${p.date}<br>Full: ${p.full} | Part: ${p.partial}</div>`).join('');
        }
        function openTemplateModal(id = null, template = null) {
            editingTemplateId = id;
            document.getElementById('template-name').value = template?.name || '';
            renderTemplateExercises(template?.exercises || []);
            document.getElementById('template-modal').classList.add('active');
        }
        function renderTemplateExercises(exercises) {
            document.getElementById('template-exercises').innerHTML = exercises.map(ex => `<div class="exercise-box"><input type="text" class="ex-name" value="${ex.exercise}"><div class="scroll-area"
style="max-height:150px;">${ex.sets?.map(s => `<div class="set-row"><input type="number" class="set-reps" value="${s.reps}"><input type="text" class="set-band" value="${s.band}"><input type="text" class="set-partials"
value="${s.partials}"></div>`).join('')}</div><button onclick="addTemplateSet(this)">➕ Set</button><button onclick="removeExercise(this)">🗑</button></div>`).join('');
        }
        function addTemplateExercise() {
            document.getElementById('template-exercises').innerHTML += `<div class="exercise-box"><input type="text" class="ex-name"><div class="scroll-area" style="max-height:150px;"></div><button onclick="addTemplateSet(this)">➕
 Set</button><button onclick="removeExercise(this)">🗑</button></div>`;
        }
        function addTemplateSet(btn) { btn.parentElement.querySelector('.scroll-area').innerHTML += `<div class="set-row"><input type="number" class="set-reps"><input type="text" class="set-band"><input type="text"
class="set-partials"></div>`; }
        function removeExercise(btn) { btn.parentElement.remove(); }
        function closeTemplateModal() { document.getElementById('template-modal').classList.remove('active'); }
        async function saveTemplate() {
            const name = document.getElementById('template-name').value;
            const exercises = [];
            document.querySelectorAll('.exercise-box').forEach(box => {
                const n = box.querySelector('.ex-name').value;
                if (!n) return;
                const sets = [];
                box.querySelectorAll('.set-row').forEach(row => { sets.push({reps: parseInt(row.querySelector('.set-reps').value) || 0, band: row.querySelector('.set-band').value, partials:
row.querySelector('.set-partials').value}); });
                exercises.push({exercise: n, sets: sets});
            });
            const data = {id: editingTemplateId || Date.now().toString(), name, exercises};
            await fetch(editingTemplateId ? `/api/templates/${editingTemplateId}` : '/api/templates', {method: editingTemplateId ? 'PUT' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            closeTemplateModal();
            openTemplateList();
        }
        async function saveWorkout() {
            const exercises = [];
            document.querySelectorAll('#log-area .exercise-box').forEach(box => {
                const n = box.querySelector('.ex-name').value;
                if (!n) return;
                const sets = [];
                box.querySelectorAll('.set-row').forEach(row => { sets.push({reps: parseInt(row.querySelector('.set-reps').value) || 0, band: row.querySelector('.set-band').value, partials:
row.querySelector('.set-partials').value}); });
                exercises.push({exercise: n, sets});
            });
            const workout = {id: editingWorkoutId, exercises};
            await fetch(editingWorkoutId ? `/api/workouts/${editingWorkoutId}` : '/api/workouts', {method: editingWorkoutId ? 'PUT' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(workout)});
            currentExercises = [];
            document.getElementById('log-area').innerHTML = '';
            editingWorkoutId = null;
        }
        function editWorkout(id, workout) { editingWorkoutId = id; currentExercises = workout.exercises || []; renderLogExercises(); switchTab('log'); }
        function renderLogExercises() {
            document.getElementById('log-area').innerHTML = currentExercises.map(ex => `<div class="exercise-box"><input type="text" class="ex-name" value="${ex.exercise}"><div class="scroll-area"
style="max-height:150px;">${ex.sets?.map(s => `<div class="set-row"><input type="number" class="set-reps" value="${s.reps}"><input type="text" class="set-band" value="${s.band}"><input type="text" class="set-partials"
value="${s.partials}"></div>`).join('')}</div><button onclick="addLogSet(this)">➕ Set</button><button onclick="removeLogExercise(this)">🗑</button></div>`).join('');
        }
        function addLogSet(btn) { btn.parentElement.querySelector('.scroll-area').innerHTML += `<div class="set-row"><input type="number" class="set-reps"><input type="text" class="set-band"><input type="text"
class="set-partials"></div>`; }
        function removeLogExercise(btn) { btn.parentElement.remove(); }
        async function exportCSV() { const res = await fetch('/api/export'); const csv = await res.text(); const blob = new Blob([csv], {type: 'text/csv'}); const url = window.URL.createObjectURL(blob); const a =
document.createElement('a'); a.href = url; a.download = 'workout_data.csv'; a.click(); }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
        loadHistory(); loadProgress(); openTemplateList();
    </script>
</body>
</html>
